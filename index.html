<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seamless Mod Swiper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cp-yellow': '#fcee0a',
              'cp-black': '#000000',
              'cp-red': '#ff003c',
              'cp-cyan': '#00e5ff',
              'cp-dark': '#0d0d0d',
              'cp-gray': '#2a2a2a',
            },
            fontFamily: {
              sans: ['Rajdhani', 'sans-serif'],
              mono: ['"Share Tech Mono"', 'monospace'],
            },
            animation: {
              'glitch-1': 'glitch-anim-1 2.5s infinite linear alternate-reverse',
              'glitch-2': 'glitch-anim-2 3s infinite linear alternate-reverse',
              'scanline': 'scanline 8s linear infinite',
            },
            keyframes: {
              'glitch-anim-1': {
                '0%': { clipPath: 'inset(20% 0 80% 0)' },
                '20%': { clipPath: 'inset(60% 0 10% 0)' },
                '40%': { clipPath: 'inset(40% 0 50% 0)' },
                '60%': { clipPath: 'inset(80% 0 5% 0)' },
                '80%': { clipPath: 'inset(10% 0 70% 0)' },
                '100%': { clipPath: 'inset(30% 0 20% 0)' },
              },
              'glitch-anim-2': {
                '0%': { clipPath: 'inset(10% 0 60% 0)' },
                '20%': { clipPath: 'inset(30% 0 10% 0)' },
                '40%': { clipPath: 'inset(70% 0 20% 0)' },
                '60%': { clipPath: 'inset(20% 0 50% 0)' },
                '80%': { clipPath: 'inset(60% 0 10% 0)' },
                '100%': { clipPath: 'inset(40% 0 30% 0)' },
              },
              scanline: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #fcee0a;
        overflow: hidden;
      }
      /* Custom Scrollbar for descriptions */
      .cp-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .cp-scrollbar::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      .cp-scrollbar::-webkit-scrollbar-thumb {
        background: #fcee0a;
      }
      .cp-clip-box {
        clip-path: polygon(
          0 0, 
          100% 0, 
          100% calc(100% - 20px), 
          calc(100% - 20px) 100%, 
          0 100%
        );
      }
      .cp-clip-btn {
        clip-path: polygon(
          10px 0, 100% 0, 
          100% calc(100% - 10px), 
          calc(100% - 10px) 100%, 
          0 100%, 0 10px
        );
      }
      .cp-boot-grid {
        background-image:
          linear-gradient(rgba(0, 229, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 255, 0.08) 1px, transparent 1px);
        background-size: 64px 64px;
        -webkit-mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
        mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      }
      .cp-hud-grid {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 48px 48px;
      }
      .cp-side-architecture {
        background-image:
          linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 35%),
          repeating-linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 2px, transparent 2px, transparent 14px),
          linear-gradient(90deg, rgba(252,238,10,0.16), rgba(252,238,10,0) 52%);
        clip-path: polygon(0 0, 100% 0, 72% 100%, 0 100%);
      }
      .cp-grid-plane {
        background-image:
          linear-gradient(rgba(0,229,255,0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,229,255,0.12) 1px, transparent 1px);
        background-size: 70px 70px;
        transform: perspective(1200px) rotateX(82deg);
        transform-origin: center top;
        mask-image: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.9) 20%, rgba(0,0,0,1));
        -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.9) 20%, rgba(0,0,0,1));
      }
      .cp-noise-soft {
        background-image:
          radial-gradient(rgba(255,255,255,0.045) 0.7px, transparent 0.7px),
          radial-gradient(rgba(255,255,255,0.03) 0.6px, transparent 0.6px);
        background-position: 0 0, 18px 18px;
        background-size: 36px 36px;
      }
      .cp-scan-drift {
        background-image: linear-gradient(180deg, transparent 0%, rgba(0,229,255,0.4) 48%, transparent 100%);
        animation: cp-scan-drift 9s linear infinite;
      }
      .cp-float-slow {
        animation: cp-float-slow 14s ease-in-out infinite;
      }
      .cp-float-reverse {
        animation: cp-float-reverse 16s ease-in-out infinite;
      }
      .cp-drift-orbit {
        animation: cp-drift-orbit 18s ease-in-out infinite;
      }
      .cp-pulse-trace {
        animation: cp-pulse-trace 6.4s ease-in-out infinite;
      }
      .line-clamp-2,
      .line-clamp-3,
      .line-clamp-6,
      .line-clamp-9 {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-2 {
        -webkit-line-clamp: 2;
      }
      .line-clamp-3 {
        -webkit-line-clamp: 3;
      }
      .line-clamp-6 {
        -webkit-line-clamp: 6;
      }
      .line-clamp-9 {
        -webkit-line-clamp: 9;
      }
      @keyframes cp-float-slow {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(2.5%, -3%, 0) scale(1.04); }
      }
      @keyframes cp-float-reverse {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(-3%, 2.5%, 0) scale(1.05); }
      }
      @keyframes cp-drift-orbit {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0.22; }
        50% { transform: translate3d(12px, -8px, 0) rotate(6deg); opacity: 0.38; }
      }
      @keyframes cp-pulse-trace {
        0%, 100% { opacity: 0.08; transform: scaleX(0.92); }
        50% { opacity: 0.32; transform: scaleX(1); }
      }
      @keyframes cp-scan-drift {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@react-three/fiber": "https://aistudiocdn.com/@react-three/fiber@^9.4.2",
    "three": "https://aistudiocdn.com/three@^0.181.2",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.4.0",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.25",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
